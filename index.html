<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Valentine?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #c0392b;
    --blush: #f8d7da;
    --cream: #fdf6ec;
    --gold: #b8860b;
    --ink: #1a0a0a;
    --petal: #e8a0a0;
  }

  body {
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 20px; height: 20px;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease;
  }
  .cursor::before {
    content: '♥';
    font-size: 18px;
    color: var(--rose);
    display: block;
    transform: translate(-50%, -50%);
  }

  /* Floating petals */
  .petal {
    position: fixed;
    font-size: 1.2rem;
    animation: fall linear infinite;
    opacity: 0;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes fall {
    0% { opacity: 0; transform: translateY(-40px) rotate(0deg); }
    10% { opacity: 0.7; }
    90% { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(110vh) rotate(360deg); }
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  /* Scene container */
  .scene {
    position: relative;
    z-index: 10;
    text-align: center;
    max-width: 600px;
    padding: 40px;
    animation: sceneIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes sceneIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Decorative border card */
  .card {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(12px);
    border: 1.5px solid rgba(192,57,43,0.18);
    padding: 56px 52px;
    position: relative;
    box-shadow:
      0 4px 60px rgba(192,57,43,0.08),
      0 1px 3px rgba(0,0,0,0.04),
      inset 0 0 0 8px rgba(248,215,218,0.3),
      inset 0 0 0 10px rgba(255,255,255,0);
  }
  .card::before, .card::after {
    content: '✦';
    position: absolute;
    font-size: 10px;
    color: var(--gold);
    opacity: 0.6;
  }
  .card::before { top: 18px; left: 18px; }
  .card::after { bottom: 18px; right: 18px; }

  .corner { position: absolute; font-size: 10px; color: var(--gold); opacity: 0.6; }
  .corner.tr { top: 18px; right: 18px; }
  .corner.bl { bottom: 18px; left: 18px; }

  /* Heart animation */
  .heart-wrap {
    margin-bottom: 32px;
    position: relative;
    display: inline-block;
  }
  .heart-main {
    font-size: 72px;
    line-height: 1;
    animation: heartbeat 1.6s ease-in-out infinite;
    display: inline-block;
    filter: drop-shadow(0 6px 20px rgba(192,57,43,0.35));
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.18); }
    28% { transform: scale(1); }
    42% { transform: scale(1.1); }
    56% { transform: scale(1); }
  }
  .heart-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1.5px solid rgba(192,57,43,0.2);
    animation: ripple 1.6s ease-out infinite;
  }
  .heart-ring:nth-child(2) { animation-delay: 0.3s; }
  @keyframes ripple {
    0% { transform: scale(0.8); opacity: 0.5; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    opacity: 0.4;
  }
  .divider-line { flex: 1; height: 1px; background: var(--rose); }
  .divider-dot { width: 4px; height: 4px; background: var(--rose); border-radius: 50%; }

  /* Text */
  .greeting {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1.05rem;
    color: var(--rose);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.8s 0.6s forwards;
  }
  .headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.2rem);
    font-weight: 700;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.9s 0.9s forwards;
  }
  .headline em {
    font-style: italic;
    color: var(--rose);
  }
  .sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: #7a4a4a;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.9s 1.1s forwards;
    line-height: 1.7;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Buttons */
  .buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.9s 1.35s forwards;
  }
  .btn {
    padding: 14px 36px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    border: none;
    cursor: none;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  .btn-yes {
    background: var(--rose);
    color: white;
    box-shadow: 0 4px 20px rgba(192,57,43,0.3);
  }
  .btn-yes::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    transition: opacity 0.3s;
  }
  .btn-yes:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 8px 28px rgba(192,57,43,0.4); }
  .btn-yes:active { transform: translateY(0) scale(0.98); }

  .btn-maybe {
    background: transparent;
    color: var(--rose);
    border: 1.5px solid rgba(192,57,43,0.35);
    transition: all 0.3s ease;
  }
  .btn-maybe:hover {
    transform: translateY(-2px);
    border-color: var(--rose);
    background: rgba(192,57,43,0.05);
  }

  /* Accepted state */
  .accepted {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.7s forwards;
  }
  .accepted-heart { font-size: 90px; animation: heartbeat 1s ease-in-out infinite; }
  .accepted-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--rose);
  }
  .accepted-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.2rem;
    color: #7a4a4a;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 14px;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    border-radius: 2px;
    animation: confettiFall 2.5s ease-in forwards;
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<div class="scene">
  <div class="card">
    <span class="corner tr">✦</span>
    <span class="corner bl">✦</span>

    <div id="main-content">
      <div class="heart-wrap">
        <div class="heart-ring"></div>
        <div class="heart-ring"></div>
        <div class="heart-main">🌹</div>
      </div>

      <p class="greeting">A question from the heart</p>

      <h1 class="headline">Would you be<br><em>My Valentine?</em></h1>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot"></div>
        <div class="divider-dot"></div>
        <div class="divider-dot"></div>
        <div class="divider-line"></div>
      </div>

      <p class="sub">Every love story is beautiful,<br>but ours could be my favourite.</p>

      <div class="buttons">
        <button class="btn btn-yes" onclick="sayYes()">Yes, always ♥</button>
        <button class="btn btn-maybe" onclick="shyButton(this)">Maybe…</button>
      </div>
    </div>

    <div class="accepted" id="accepted">
      <div class="accepted-heart">💕</div>
      <div class="accepted-title">You said Yes!</div>
      <p class="accepted-sub">My heart just skipped a beat…<br>Happy Valentine's Day, my love.</p>
    </div>
  </div>
</div>

<script>
  // Custom cursor

  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  // Falling petals
  const petals = ['🌸', '🌺', '🌹', '💮', '✿'];
  function createPetal() {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petals[Math.floor(Math.random() * petals.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    p.style.animationDuration = (5 + Math.random() * 8) + 's';
    p.style.animationDelay = (Math.random() * 3) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 14000);
  }
  setInterval(createPetal, 600);
  for (let i = 0; i < 8; i++) setTimeout(createPetal, i * 200);

  // Say yes
  function sayYes() {
    launchConfetti();
    const main = document.getElementById('main-content');
    const acc = document.getElementById('accepted');
    main.style.animation = 'none';
    main.style.opacity = '0';
    main.style.transform = 'scale(0.9)';
    main.style.transition = 'all 0.4s ease';
    setTimeout(() => {
      main.style.display = 'none';
      acc.style.display = 'flex';
    }, 400);
  }

  // Shy "maybe" button
  const shyMessages = ['Are you sure?', 'Pretty please?', 'Think about it…', 'I promise it\'ll be lovely!', 'One more chance 💕'];
  let shyCount = 0;
  function shyButton(btn) {
    if (shyCount < shyMessages.length - 1) {
      btn.textContent = shyMessages[shyCount++];
      btn.style.transform = 'translateX(' + (Math.random() * 60 - 30) + 'px) translateY(' + (Math.random() * 30 - 15) + 'px)';
    } else {
      sayYes();
    }
  }

  // Confetti
  const colors = ['#c0392b','#e74c3c','#f8d7da','#b8860b','#f39c12','#fff0f0'];
  function launchConfetti() {
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = '-20px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.transform = `rotate(${Math.random() * 360}deg)`;
        c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, Math.random() * 800);
    }
  }
</script>
</body>
</html>
